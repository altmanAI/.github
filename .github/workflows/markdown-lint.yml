# Draft workflow — manual trigger only. Not enabled on push/PR automatically.
# Review and change the trigger to `pull_request` / `push` once approved for automatic use.
name: Markdown Lint (manual)

on:
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
