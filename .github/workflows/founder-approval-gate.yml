name: Founder Approval Gate

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  founder-approval:
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    runs-on: ubuntu-latest
    env:
      FOUNDER_APPROVER_LOGIN: ${{ vars.FOUNDER_APPROVER_LOGIN }}

    steps:
      - name: Check governed paths and founder authorization
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number;
            const founderLogin = process.env.FOUNDER_APPROVER_LOGIN || 'altmanAI';
            const approvalPhrase = 'All Clear for Impact';
            const marker = '<!-- altmanai-founder-approval-gate -->';

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 },
            );

            const governedRootFiles = new Set([
              'GOVERNANCE.md',
              'SECURITY.md',
              'CONTRIBUTING.md',
              'CODE_OF_CONDUCT.md',
              'AI_SYSTEMS_POLICY.md',
              'VERSION',
              'CHANGELOG.md',
              'package.json',
              'pyproject.toml',
              'Cargo.toml',
              'go.mod',
            ]);

            const requiresFounderApproval = files.some(({ filename }) => {
              return (
                governedRootFiles.has(filename) ||
                filename.startsWith('docs/') ||
                filename.startsWith('profile/') ||
                filename.startsWith('.github/workflows/') ||
                filename.startsWith('.github/ISSUE_TEMPLATE/') ||
                filename === '.github/pull_request_template.md' ||
                /(^|\/)(release|version)(\.|\/|$)/i.test(filename)
              );
            });

            if (!requiresFounderApproval) {
              core.notice('No governed paths detected. Founder approval gate is not required.');
              return;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pull_number, per_page: 100 },
            );

            const exactPhrasePattern = /(?:^|\n)\s*All Clear for Impact\s*(?:\n|$)/;
            const approvalComment = comments.find((comment) => {
              return (
                comment.user?.login === founderLogin &&
                exactPhrasePattern.test(comment.body || '')
              );
            });

            const changedGovernedFiles = files
              .map(({ filename }) => filename)
              .filter((filename) => {
                return (
                  governedRootFiles.has(filename) ||
                  filename.startsWith('docs/') ||
                  filename.startsWith('profile/') ||
                  filename.startsWith('.github/workflows/') ||
                  filename.startsWith('.github/ISSUE_TEMPLATE/') ||
                  filename === '.github/pull_request_template.md' ||
                  /(^|\/)(release|version)(\.|\/|$)/i.test(filename)
                );
              });

            const status = approvalComment ? 'APPROVED' : 'PENDING';
            const checklist = [
              marker,
              '## Founder approval gate',
              '',
              `**Status:** ${status}`,
              `**Required approver:** @${founderLogin}`,
              '',
              'This pull request changes governance-sensitive, documentation, workflow, profile, release, or version-controlled paths.',
              '',
              '- [ ] Evidence and validation are linked in the pull request',
              '- [ ] AI assistance is disclosed',
              '- [ ] P.A.I.H.I. review is complete',
              '- [ ] Rollback or correction plan is documented',
              `- [${approvalComment ? 'x' : ' '}] Founder posted the exact standalone phrase: **${approvalPhrase}**`,
              '',
              '<details><summary>Governed files detected</summary>',
              '',
              ...changedGovernedFiles.map((filename) => `- \`${filename}\``),
              '',
              '</details>',
              '',
              approvalComment
                ? `Approval record: ${approvalComment.html_url}`
                : 'Approval must be a visible pull-request comment from the configured founder account. The workflow cannot create or infer approval.',
            ].join('\n');

            const priorGateComment = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (priorGateComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: priorGateComment.id,
                body: checklist,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: checklist,
              });
            }

            if (!approvalComment) {
              core.setFailed(
                `Founder approval required. @${founderLogin} must post the exact standalone phrase: ${approvalPhrase}`,
              );
            } else {
              core.info(`Founder approval verified at ${approvalComment.html_url}`);
            }
